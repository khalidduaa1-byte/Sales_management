<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="BA Sales"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/icons/icon.svg"/>
<title>My Sales</title>
<script src="/pwa.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f4f6f9;
  --card: #ffffff;
  --card2: #f8fafc;
  --border: #e2e8f0;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --green: #16a34a;
  --orange: #d97706;
  --red: #dc2626;
  --text: #1e293b;
  --muted: #64748b;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── Top bar ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.topbar-left h2 { font-size: 16px; font-weight: 700; color: var(--text); }
.topbar-left p  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.signout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
.signout-btn:hover { background: #f1f5f9; }

/* ── Monthly target (BA only sees own progress; data scoped by RLS) ── */
.target-banner {
  max-width: 480px;
  margin: 0 auto;
  padding: 14px 16px 0;
}
.target-card {
  background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
  border: 1px solid #bfdbfe;
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.08);
}
.target-card h3 {
  font-size: 12px;
  font-weight: 700;
  color: #1e40af;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.target-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
}
.target-row .big {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
}
.target-row .sub {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  line-height: 1.35;
}
.target-bar-bg {
  height: 10px;
  border-radius: 999px;
  background: #e2e8f0;
  overflow: hidden;
  margin-bottom: 8px;
}
.target-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #2563eb, #16a34a);
  transition: width 0.35s ease;
  width: 0%;
}
.target-foot {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}
.target-foot strong { color: #1e293b; }

.container { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

/* ── Stats row ── */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── Form card ── */
.form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 18px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.form-card h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
input, select {
  width: 100%;
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 14px;
  outline: none;
  -webkit-appearance: none;
}
input:focus, select:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
input[type="number"] { font-size: 22px; font-weight: 700; }

/* Shift selector */
.shift-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.shift-btn {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: .15s;
}
.shift-btn .icon  { font-size: 20px; display: block; margin-bottom: 4px; }
.shift-btn .label { font-size: 11px; font-weight: 600; color: var(--muted); }
.shift-btn.selected {
  border-color: var(--accent);
  background: #eff6ff;
}
.shift-btn.selected .label { color: var(--accent); }

.date-range-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.date-range-row input { margin-bottom: 0; }

.submit-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
  transition: .15s;
}
.submit-btn:hover   { background: var(--accent-hover); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

.msg {
  padding: 13px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.msg.error   { background: #fef2f2; color: var(--red);   border: 1px solid #fecaca; }
.msg.success { background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; }

/* ── History ── */
.history-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.history-card h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.entry-row {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.entry-row:last-child { border-bottom: none; }
.entry-row:hover { background: #f8fafc; }
.entry-left {}
.entry-date  { font-size: 12px; color: var(--muted); }
.entry-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.entry-right { text-align: right; }
.entry-amount { font-size: 18px; font-weight: 800; color: var(--text); }
.entry-items  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.entry-delete {
  margin-top: 8px;
  border: 1px solid #fecaca;
  background: #fff1f2;
  color: #dc2626;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 8px;
  cursor: pointer;
}
.entry-delete:hover { background: #ffe4e6; }
.shift-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  margin-top: 4px;
}
.shift-Morning   { background: #fef3c7; color: var(--orange); }
.shift-Afternoon { background: #eff6ff; color: var(--accent); }
.shift-Evening   { background: #f5f3ff; color: #7c3aed; }
.empty-state { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

  <div class="topbar-left">
    <h2 id="ba-name">Loading…</h2>
    <p id="ba-meta"></p>
  </div>
  <button class="signout-btn" onclick="signOut()">Sign out</button>
</div>

<!-- Target vs your sales (month) — only your rows are returned from Supabase for BAs -->
<div class="target-banner" id="target-banner-wrap">
  <div class="target-card" id="target-card">

    <div class="target-row">
      <div class="big" id="target-attain-pct">—</div>

</div>

<div class="container">

  <!-- Stats summary -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="stat-month-sales">—</div>
      <div class="stat-lbl">This Month $</div>
    </div>
    <div class="stat">

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://tnxkstouapfcjoboymnf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRueGtzdG91YXBmY2pvYm95bW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjE5NzgsImV4cCI6MjA5MjUzNzk3OH0.wuzHb3otLoCMCN26fvJvzN3S0cw4Z7gHv6gdnXRnBKQ',
  {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    global: {
      fetch: (url, options = {}) =>
        fetch(url, { ...options, cache: 'no-store' }),
    },
  }
);

let currentUser = null;
let currentProfile = null;

// ── On page load ──────────────────────────────────────────────────
// getSession checks if the user is logged in (Supabase stores a token in the browser)
(async () => {
  const { data: { user }, error: authErr } = await sb.auth.getUser();
  if (authErr || !user) { window.location.href = 'index.html'; return; }

  currentUser = user;

  const { data: profile, error: pErr } = await sb
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();

  if (pErr || !profile) {
    await sb.auth.signOut();
    window.location.href = 'index.html?error=profile&detail=' + encodeURIComponent(pErr?.message || 'Profile not found');
    return;
  }
  if (profile.role !== 'ba') {
    if (profile.role === 'manager') { window.location.href = 'manager.html'; return; }
    await sb.auth.signOut();
    window.location.href = 'index.html?error=profile&detail=' + encodeURIComponent('Invalid role: ' + profile.role);
    return;
  }

  currentProfile = profile;

  // Attach Excel imports to this account before we sum sales (avoids double-count in UI).
  try {
    await sb.rpc('link_my_legacy_rows');
  } catch (_) { /* non-fatal */ }

  // Update the header
  document.getElementById('ba-name').textContent = profile.name;
  document.getElementById('ba-meta').textContent = profile.store ? `${profile.team} · ${profile.store}` : `${profile.team}`;

  populateShopOptions();
  setDefaultDates();
  await loadHistory();
  await updateStats();
  await refreshTargetBanner();
})();

// ── Team / month helpers (align with manager dashboard naming) ───
function canonicalTeamName(raw) {
  const key = String(raw || '').trim().toLowerCase();
  if (key === 'cairo') return 'Cairo';
  if (key === 'sharm') return 'Sharm';
  if (['hurgadah', 'hurghada', 'hurgahda', 'hurgada'].includes(key)) return 'Hurgadah';
  return raw || '';
}

const SHOPS_BY_TEAM = {
  Cairo: [
    'Terminal 3 Cairo',
    'Terminal 2 Cairo',
    'Terminal 1 Cairo',
    'Seasonal Terminal',
  ],
  Sharm: ['Sharm Sheikh'],
  Hurgadah: ['Hurghada russian shop', 'Hurghada European shop'],
};

function populateShopOptions() {
  const sel = document.getElementById('entry-store');
  if (!sel) return;
  const team = currentProfile ? canonicalTeamName(currentProfile.team) : '';
  const shops = SHOPS_BY_TEAM[team] || Object.values(SHOPS_BY_TEAM).flat();
  const prev = sel.value;
  sel.innerHTML = '<option value="">Select shop</option>' +
    shops.map(s => `<option value="${s}">${s}</option>`).join('');
  if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
}

function selectedMonthKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
}

function monthDateBounds(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  const start = `${monthKey}-01`;
  const last = new Date(y, m, 0).getDate();
  const end = `${monthKey}-${String(last).padStart(2, '0')}`;
  return { start, end };
}

function formatMonthLabel(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function attendanceStatusLabel(status) {
  switch (status) {
    case 'annual_leave': return 'Annual Leave';
    case 'off_day': return 'Off Day';
    case 'public_holiday': return 'Public Holiday';
    case 'sick_leave': return 'Sick Leave';
    case 'other': return 'Sick Leave'; /* legacy Excel imports used status "other" */
    default: return 'Leave';
  }
}

/** Same day + shop + shift must count once (linked import + legacy name row = duplicate). */
function salesShiftKey(e) {
  const store = String(e.store || '').trim().toLowerCase();
  const shift = String(e.shift || '').trim().toLowerCase();
  return `${e.entry_date}|${store}|${shift}`;
}

function salesRowRank(e) {
  const uid = currentUser && currentUser.id ? String(currentUser.id) : '';
  const linked = uid && e.ba_id && String(e.ba_id) === uid;
  const amount = Number(e.sales_amount || 0);
  return (linked ? 4 : 0) + (amount > 0 ? 2 : 0);
}

function dedupeMySalesRows(rows) {
  const map = new Map();
  (rows || []).forEach(e => {
    const key = salesShiftKey(e);
    const prev = map.get(key);
    if (!prev) {
      map.set(key, e);
      return;
    }
    const rNew = salesRowRank(e);
    const rOld = salesRowRank(prev);
    if (rNew > rOld) map.set(key, e);
    else if (rNew === rOld && String(e.created_at || '') > String(prev.created_at || '')) map.set(key, e);
  });
  return [...map.values()];
}

function sumSalesAmount(rows) {
  return rows.reduce((s, r) => s + Number(r.sales_amount || 0), 0);
}

/** Personal goal for the month (matches manager logic: per_ba vs team_total + headcount). */
async function computePersonalMonthlyTarget(monthKey, teamCanon) {
  const { data: tRow, error: tErr } = await sb
    .from('monthly_targets')
    .select('target_type, target_value')
    .eq('month_key', monthKey)
    .eq('team', teamCanon)
    .maybeSingle();
  if (tErr || !tRow) return { goal: null, mode: 'none', raw: null };

  const type = tRow.target_type;
  const value = Number(tRow.target_value) || 0;
  if (type === 'per_ba') {
    return { goal: value, mode: 'per_ba', raw: tRow };
  }
  const { count, error: cErr } = await sb
    .from('profiles')
    .select('*', { count: 'exact', head: true })
    .eq('team', teamCanon)
    .eq('role', 'ba');
  const n = !cErr && count ? Math.max(1, count) : 1;
  const share = value / n;
  return { goal: share, mode: 'team_total', teamGoal: value, teamBas: n, raw: tRow };
}

async function refreshTargetBanner() {
  const pctEl = document.getElementById('target-attain-pct');
  const subEl = document.getElementById('target-attain-sub');
  const footEl = document.getElementById('target-foot');
  const barEl = document.getElementById('target-bar-fill');
  const wrap = document.getElementById('target-banner-wrap');

  if (!currentProfile || currentProfile.role !== 'ba') return;

  const team = canonicalTeamName(currentProfile.team);
  if (!team) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';

  const monthKey = selectedMonthKey();
  const { start, end } = monthDateBounds(monthKey);
  const monthTitle = document.getElementById('target-month-title');
  if (monthTitle) monthTitle.textContent = `Monthly target — ${formatMonthLabel(monthKey)}`;

  const [{ goal, mode, teamGoal, teamBas }, salesRes] = await Promise.all([
    computePersonalMonthlyTarget(monthKey, team),
    sb.from('sales_entries')
      .select('sales_amount')
      .gte('entry_date', start)
      .lte('entry_date', end),
  ]);

  if (salesRes.error) {
    subEl.textContent = 'Could not load your sales.';
    footEl.textContent = salesRes.error.message || '';
    pctEl.textContent = '—';
    barEl.style.width = '0%';
    return;
  }

  const monthSales = dedupeMySalesRows(salesRes.data || []);
  const mySales = sumSalesAmount(monthSales);

  if (goal == null || !Number.isFinite(goal) || goal <= 0) {
    pctEl.textContent = '—';
    subEl.textContent = 'No target set';
    footEl.innerHTML = `Your sales <strong>${formatMonthLabel(monthKey)}</strong>: <strong>$${mySales.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong>. Ask your manager to set the monthly target for <strong>${team}</strong>.`;
    barEl.style.width = '0%';
    return;
  }

  const pct = Math.min(150, (mySales / goal) * 100);
  const remain = Math.max(0, goal - mySales);

  pctEl.textContent = `${pct.toFixed(0)}%`;
  subEl.innerHTML =
    `You: <strong>$${mySales.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong><br/>` +
    `Goal: <strong>$${goal.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong>`;

  if (mode === 'team_total' && teamGoal != null) {
    footEl.innerHTML =
      `Team target <strong>$${teamGoal.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong> split across <strong>${teamBas}</strong> BAs (even share for your progress bar). ` +
      (remain > 0
        ? `<strong>$${remain.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong> left to reach your share.`
        : `<strong>Share reached</strong> — great work.`);
  } else {
    footEl.innerHTML =
      remain > 0
        ? `<strong>$${remain.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong> left to hit your personal target.`
        : `Personal target reached — great work.`;
  }

  barEl.style.width = `${Math.min(100, pct)}%`;
}

// ── Helpers ───────────────────────────────────────────────────────
function todayIso() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function setDefaultDates() {
  const today = todayIso();
  document.getElementById('entry-date').value = today;
  const leaveFrom = document.getElementById('leave-from');
  const leaveTill = document.getElementById('leave-till');
  if (leaveFrom) leaveFrom.value = today;
  if (leaveTill) leaveTill.value = today;
}

function enumerateDatesInclusive(start, end) {
  const out = [];
  if (!start || !end || start > end) return out;
  const cur = new Date(start + 'T12:00:00');
  const last = new Date(end + 'T12:00:00');
  while (cur <= last) {
    const y = cur.getFullYear();
    const m = String(cur.getMonth() + 1).padStart(2, '0');
    const day = String(cur.getDate()).padStart(2, '0');
    out.push(`${y}-${m}-${day}`);
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

// ── Submit a sale ─────────────────────────────────────────────────
async function submitSale() {
  const amount = parseFloat(document.getElementById('sales-amount').value);
  const items  = parseInt(document.getElementById('items-sold').value);
  const date   = document.getElementById('entry-date').value;
  const store  = document.getElementById('entry-store').value;
  const shift  = document.getElementById('entry-shift').value;

  if (!date)          return showMsg('Please select a date.', 'error');
  if (!store)         return showMsg('Please select a shop.', 'error');
  if (!shift)         return showMsg('Please select a shift.', 'error');
  if (isNaN(amount) || amount < 0) return showMsg('Enter sales amount (0 or more).', 'error');
  if (isNaN(items)  || items  <  0) return showMsg('Enter items count (0 or more).', 'error');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  // Prevent duplicates for same BA + date + shop + shift:
  // if row exists, update it; otherwise insert new.
  const { data: existingRows, error: findErr } = await sb
    .from('sales_entries')
    .select('id')
    .eq('ba_id', currentUser.id)
    .eq('entry_date', date)
    .eq('store', store)
    .eq('shift', shift)
    .limit(1);

  let error = findErr;
  if (!error && existingRows && existingRows.length) {
    const existingId = existingRows[0].id;
    const { error: updErr } = await sb
      .from('sales_entries')
      .update({
        ba_name: currentProfile.name,
        team: currentProfile.team,
        sales_amount: amount,
        items_sold: items,
        working_days: 1,
      })
      .eq('id', existingId)
      .eq('ba_id', currentUser.id);
    error = updErr;
  } else if (!error) {
    const { error: insErr } = await sb.from('sales_entries').insert({
      ba_id:        currentUser.id,
      ba_name:      currentProfile.name,
      team:         currentProfile.team,
      store,
      shift,
      sales_amount: amount,
      items_sold:   items,
      working_days: 1,
      entry_date:   date,
    });
    error = insErr;
  }

  btn.disabled = false;
  btn.textContent = 'Log Entry ✓';

  if (error) {
    showMsg('Error saving: ' + error.message, 'error');
  } else {
    showMsg(
      amount === 0
        ? '😢 Zero sales logged — better luck next shift!'
        : 'Entry logged successfully!',
      'success'
    );
    document.getElementById('sales-amount').value = '';
    document.getElementById('items-sold').value   = '';
    document.getElementById('entry-shift').value  = '';
    setDefaultDates();
    try { await sb.rpc('link_my_legacy_rows'); } catch (_) {}
    await loadHistory();
    await updateStats();
    await refreshTargetBanner();
  }
}

async function deleteSale(saleId) {
  if (!saleId) return;
  if (!confirm('Delete this sale entry? This cannot be undone.')) return;
  const uid = currentUser && currentUser.id ? String(currentUser.id) : '';
  if (!uid) {
    showMsg('Not signed in. Refresh the page and try again.', 'error');
    return;
  }
  // .select() is required: DELETE can match 0 rows (RLS / wrong id) and still return error: null.
  // RLS decides which rows may be deleted (own ba_id or legacy name-matched import).
  const { data, error } = await sb
    .from('sales_entries')
    .delete()
    .eq('id', saleId)
    .select('id');
  if (error) {
    showMsg('Error deleting sale: ' + error.message, 'error');
    return;
  }
  if (!data || data.length === 0) {
    showMsg('Could not delete this entry (nothing removed). If it is an old import, ask a manager to remove it in Supabase.', 'error');
    return;
  }
  showMsg('Sale entry deleted.', 'success');
  try { await sb.rpc('link_my_legacy_rows'); } catch (_) {}
  await loadHistory();
  await updateStats();
  await refreshTargetBanner();
}

// ── Submit off/leave (single day or From–Till range) ─────────────
async function submitLeave() {
  const from = document.getElementById('leave-from').value;
  const till = document.getElementById('leave-till').value;
  const status = document.getElementById('leave-type').value;
  const notes = document.getElementById('leave-notes').value.trim();

  if (!from || !till) return showMsg('Please select From and Till dates.', 'error');
  if (till < from) return showMsg('Till date must be on or after From date.', 'error');
  if (!status) return showMsg('Please choose leave status.', 'error');

  const dates = enumerateDatesInclusive(from, till);
  if (!dates.length) return showMsg('Invalid date range.', 'error');
  if (dates.length > 62) return showMsg('Maximum 62 days at once. Use a shorter range.', 'error');

  const btn = document.getElementById('leave-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const rows = dates.map(entry_date => ({
    ba_id: currentUser.id,
    ba_name: currentProfile.name,
    team: currentProfile.team,
    store: currentProfile.store || null,
    entry_date,
    status,
    notes: notes || null,
  }));

  const { error } = await sb.from('ba_attendance_entries').upsert(rows, {
    onConflict: 'ba_id,entry_date',
  });

  btn.disabled = false;
  btn.textContent = 'Save Status ✓';

  if (error) {
    showMsg('Error saving leave/off day: ' + error.message, 'error');
  } else {
    const n = dates.length;
    showMsg(
      n === 1 ? 'Leave/off day saved.' : `Leave/off saved for ${n} days (${from} → ${till}).`,
      'success'
    );
    document.getElementById('leave-notes').value = '';
    setDefaultDates();
    await loadHistory();
  }
}

// ── Load history ──────────────────────────────────────────────────
async function loadHistory() {
  // RLS returns only this BA's rows — scope to current month so old Excel months don't look like "today".
  const monthKey = selectedMonthKey();
  const { start, end } = monthDateBounds(monthKey);

  const { data: entriesRaw } = await sb
    .from('sales_entries')
    .select('*')
    .gte('entry_date', start)
    .lte('entry_date', end)
    .order('entry_date', { ascending: false })
    .limit(120);
  const entries = dedupeMySalesRows(entriesRaw || [])
    .sort((a, b) => {
      if (a.entry_date !== b.entry_date) return a.entry_date < b.entry_date ? 1 : -1;
      return String(b.created_at || '') > String(a.created_at || '') ? 1 : -1;
    })
    .slice(0, 40);
  const { data: attendance } = await sb
    .from('ba_attendance_entries')
    .select('*')
    .gte('entry_date', start)
    .lte('entry_date', end)
    .order('entry_date', { ascending: false })
    .limit(40);

  const list = document.getElementById('history-list');
  const salesRows = (entries || []).map(e => ({
    kind: 'sale',
    id: e.id,
    ba_id: e.ba_id,
    entry_date: e.entry_date,
    created_at: e.created_at,
    store: e.store,
    shift: e.shift,
    sales_amount: e.sales_amount,
    items_sold: e.items_sold,
  }));
  const attRows = (attendance || []).map(a => ({
    kind: 'attendance',
    entry_date: a.entry_date,
    created_at: a.created_at,
    status: a.status,
    notes: a.notes,
  }));
  const rows = [...salesRows, ...attRows]
    .sort((a, b) => {
      if (a.entry_date !== b.entry_date) return a.entry_date < b.entry_date ? 1 : -1;
      const ac = a.created_at || '';
      const bc = b.created_at || '';
      return ac < bc ? 1 : -1;
    })
    .slice(0, 40);

  if (!rows.length) {
    list.innerHTML = '<div class="empty-state">No submissions yet — log your first shift above!</div>';
    return;
  }

  list.innerHTML = rows.map(r => {
    if (r.kind === 'sale') {
      // RLS only returns this BA's app rows + legacy imports for their name; expanded delete policy allows both.
      const canDelete = true;
      const delBtn = canDelete
        ? `<button type="button" class="entry-delete" data-sale-id="${r.id}">Delete</button>`
        : '';
      const saleAmt = Number(r.sales_amount);
      const saleAmtLabel = saleAmt === 0
        ? '$0 😢'
        : '$' + saleAmt.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return `
        <div class="entry-row">
          <div class="entry-left">
            <div class="entry-date">${formatDate(r.entry_date)} • Sale</div>
            <div class="entry-meta">${r.store || '—'} • ${r.shift || '—'}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amount">${saleAmtLabel}</div>
            <div class="entry-items">${r.items_sold} pcs</div>
            ${delBtn}
          </div>
        </div>
      `;
    }
    const statusLabel = attendanceStatusLabel(r.status);
    return `
      <div class="entry-row">
        <div class="entry-left">
          <div class="entry-date">${formatDate(r.entry_date)} • ${statusLabel}</div>
          <div class="entry-meta">${r.notes || 'No notes'}</div>
        </div>
        <div class="entry-right">
          <div class="entry-items">No sales expected</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Update stats ──────────────────────────────────────────────────
async function updateStats() {
  const monthKey = selectedMonthKey();
  const { start, end } = monthDateBounds(monthKey);

  const { data: entries, error } = await sb
    .from('sales_entries')
    .select('sales_amount, items_sold, entry_date')
    .gte('entry_date', start)
    .lte('entry_date', end);

  if (error || !entries) return;
  const monthSales = dedupeMySalesRows(entries);
  const totalSales = sumSalesAmount(monthSales);
  const totalItems = monthSales.reduce((s, e) => s + Number(e.items_sold || 0), 0);

  document.getElementById('stat-month-sales').textContent = '$' + totalSales.toLocaleString('en-US', {maximumFractionDigits:0});
  document.getElementById('stat-month-items').textContent = totalItems;
  document.getElementById('stat-shifts').textContent      = new Set(monthSales.map(e => e.entry_date)).size;
}

// ── Sign out ──────────────────────────────────────────────────────
async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function formatDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => el.style.display = 'none', 3000);
}

// Inline onclick can fail to resolve async handlers in some mobile / in-app browsers; delegate clicks.
document.getElementById('history-list').addEventListener('click', (e) => {
  const btn = e.target && e.target.closest && e.target.closest('.entry-delete');
  if (!btn || !btn.getAttribute) return;
  const id = btn.getAttribute('data-sale-id');
  if (id) {
    e.preventDefault();
    deleteSale(id);
  }
});

// Explicit globals for other inline handlers (submitSale, signOut, …).
window.deleteSale = deleteSale;
</script>
